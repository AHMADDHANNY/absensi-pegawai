<script>
        /* =============================================================
           NOTE: Escape iframe dihapus — diblokir browser modern (cross-origin).
           input[type=file] di iframe GAS sudah bisa jalan langsung di Chrome/Android.
        ============================================================= */

        /* =============================================================
           VARIABEL GLOBAL
        ============================================================= */
        let user = null;
        let office = { lat: 3.509973, lng: 98.895861, rad: 100 };
        let currentLoc = { lat: 0, lng: 0 };
        let attType = '';

        let adminMap, adminMarker, adminCircle;
        let userMap, userPosMarker, userOfficeCircle, userOfficeMarker;

        /* =============================================================
           INIT
           FIX: listener Enter pada password digabung ke dalam window.onload
           (bukan window.addEventListener('load', ...) terpisah) supaya tidak
           berisiko gagal terpasang kalau event 'load' sudah lebih dulu
           terpicu sebelum script ini sempat dievaluasi di dalam iframe GAS.
        ============================================================= */
        window.onload = () => {
            startTime();
            initGPS();

            // FIX: localStorage bisa menyimpan cache office dari sesi lama yang
            // sudah salah skala (misal dari sebelum bug normalisasi koordinat
            // diperbaiki di backend). Cache yang di luar rentang valid
            // (lat -90..90, lng -180..180) sekarang dibuang, bukan dipakai,
            // supaya tidak terus "menular" ke peta dan form setiap kali halaman
            // dibuka ulang.
            const cachedOffice = localStorage.getItem('presensi_office_v3');
            if (cachedOffice) {
                try {
                    const parsed = JSON.parse(cachedOffice);
                    const validLat = parsed.lat && Math.abs(parsed.lat) <= 90;
                    const validLng = parsed.lng && Math.abs(parsed.lng) <= 180;
                    if (validLat && validLng) {
                        office = parsed;
                    } else {
                        console.warn('Cache office lama tidak valid, dibuang:', parsed);
                        localStorage.removeItem('presensi_office_v3');
                    }
                } catch (e) {
                    localStorage.removeItem('presensi_office_v3');
                }
            }

            const saved = localStorage.getItem('presensi_user_v3');
            if (saved) {
                try {
                    user = JSON.parse(saved);
                    setupApp();
                } catch (e) {
                    localStorage.removeItem('presensi_user_v3');
                }
            }

            // FIX: pindah dari window.addEventListener('load', ...) ke sini.
            // Lebih aman karena dijamin jalan bersamaan dengan init lain,
            // tidak tergantung urutan event listener tambahan.
            const passField = document.getElementById('loginPass');
            if (passField) passField.addEventListener('keydown', e => {
                if (e.key === 'Enter') handleLogin();
            });
        };

        /* =============================================================
           SETUP APP SETELAH LOGIN
        ============================================================= */
        function setupApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userName').innerText = esc(user.nama);

            if (user.role === 'admin') {
                document.getElementById('nav-setting').classList.remove('hidden');
                document.getElementById('nav-pegawai').classList.remove('hidden');
                document.getElementById('nav-log').classList.remove('hidden');
                document.getElementById('nav-izin').classList.remove('hidden');
            }

            setTimeout(() => {
                refreshData();
                window.dispatchEvent(new Event('resize'));
            }, 800);

            try {
                google.script.run
                    .withSuccessHandler(loc => {
                        // FIX: validasi rentang sebelum dipakai, sebagai lapis
                        // pengaman tambahan terhadap data salah skala.
                        if (loc && loc.lat && loc.lng && !loc.error &&
                            Math.abs(loc.lat) <= 90 && Math.abs(loc.lng) <= 180) {
                            office = { lat: loc.lat, lng: loc.lng, rad: loc.rad || 100 };
                            localStorage.setItem('presensi_office_v3', JSON.stringify(office));
                            initUserMap(office.lat, office.lng, office.rad);
                            updateGPSUI();
                        } else if (loc && (loc.error || (loc.lat && Math.abs(loc.lat) > 90))) {
                            console.warn('getOfficeLocation mengembalikan data tidak valid:', loc);
                        }
                    })
                    .withFailureHandler(err => console.warn('getOfficeLocation gagal:', err))
                    .getOfficeLocation();
            } catch (e) {
                console.warn('getOfficeLocation tidak tersedia:', e);
            }
        }

        /* =============================================================
           NAVIGASI TAB
           FIX: tab Izin sekarang menyesuaikan logika user vs admin.
           Sebelumnya switchTab selalu memanggil loadAdminIzin() untuk tab
           'izin', padahal user biasa juga punya akses ke tab ini (ajukan
           izin), bukan hanya approval. Sekarang title & panel menyesuaikan
           role: admin -> daftar approval, user -> form pengajuan saja.
        ============================================================= */
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');

            document.querySelectorAll('nav button').forEach(b => {
                b.classList.replace('text-indigo-600', 'text-gray-400');
            });
            const navBtn = document.getElementById('nav-' + id);
            if (navBtn) navBtn.classList.replace('text-gray-400', 'text-indigo-600');

            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (id === 'setting') {
                    initAdminMap(office.lat, office.lng, office.rad);
                } else if (id === 'home') {
                    if (userMap) {
                        centerMapOnUser();
                    } else {
                        initUserMap(office.lat, office.lng, office.rad);
                    }
                } else if (id === 'pegawai') {
                    loadPegawaiData();
                } else if (id === 'log') {
                    loadAttendanceLog();
                } else if (id === 'izin') {
                    // FIX: hanya admin yang load daftar approval.
                    // User biasa tidak perlu fetch seluruh data izin orang lain.
                    if (user && user.role === 'admin') {
                        loadAdminIzin();
                    }
                }
            }, 500);
        }

        /* =============================================================
           SANITASI XSS — FIX: semua data dari server wajib lewat esc()
        ============================================================= */
        function esc(str) {
            if (str === null || str === undefined) return '';
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(String(str)));
            return d.innerHTML;
        }

        /* FIX: escape khusus untuk dipakai di dalam atribut onclick='...'.
           esc() di atas hanya meng-escape karakter HTML (&, <, >, ") tapi
           TIDAK meng-escape kutip tunggal ('). Karena semua onclick di app
           ini memakai kutip tunggal sebagai delimiter, nama/jabatan/dll yang
           mengandung karakter ' bisa memutus attribute dan menyuntik HTML/JS
           baru (XSS). escAttr() menambahkan escape \' di atas hasil esc(). */
        function escAttr(str) {
            return esc(str).replace(/'/g, '&#39;');
        }

        /* =============================================================
           LOAD DATA PEGAWAI
        ============================================================= */
        function loadPegawaiData() {
            try {
                google.script.run
                    .withSuccessHandler(function (data) {
                        _usersCache = data || []; // FIX: simpan ke cache global juga di sini
                        if (!data || !data.length) {
                            document.getElementById('adminUserTable').innerHTML =
                                '<tr><td colspan="6" class="py-8 text-center text-gray-400 text-xs">Belum ada data pegawai</td></tr>';
                            document.getElementById('pegawaiCount').innerText = '0';
                            return;
                        }
                        document.getElementById('pegawaiCount').innerText = data.length;
                        document.getElementById('adminUserTable').innerHTML = data.map(function (u, i) {
                            var roleBadge = u[4] === 'admin'
                                ? 'bg-amber-100 text-amber-700'
                                : 'bg-indigo-50 text-indigo-600';
                            // FIX: u[4]=role, u[5]=pass — JANGAN tampilkan password di atribut HTML
                            // Gunakan data-id untuk trigger modal, bukan inline onclick dengan semua data
                            return '<tr class="' + (i % 2 === 0 ? 'bg-white' : 'bg-gray-50') + ' border-b border-gray-100">' +
                                '<td class="py-3 px-3 font-bold text-gray-400">' + (i + 1) + '</td>' +
                                '<td class="py-3 px-3 font-bold text-gray-900">' + esc(u[1]) + '</td>' +
                                '<td class="py-3 px-3 text-gray-600">' + esc(u[2] || '-') + '</td>' +
                                '<td class="py-3 px-3 text-gray-600">' + esc(u[3]) + '</td>' +
                                '<td class="py-3 px-3 text-center"><span class="px-2 py-1 rounded-lg text-[9px] font-black uppercase ' + roleBadge + '">' + esc(u[4]) + '</span></td>' +
                                '<td class="py-3 px-3 text-center"><div class="flex gap-1 justify-center">' +
                                '<button onclick="loadAndEditUser(\'' + escAttr(u[0]) + '\')" class="w-7 h-7 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center"><i class="fas fa-edit text-[10px]"></i></button>' +
                                '<button onclick="deleteUserUI(\'' + escAttr(u[0]) + '\')" class="w-7 h-7 bg-red-50 text-red-600 rounded-lg flex items-center justify-center"><i class="fas fa-trash text-[10px]"></i></button>' +
                                '</div></td></tr>';
                        }).join('');
                    })
                    .withFailureHandler(function () {
                        document.getElementById('adminUserTable').innerHTML =
                            '<tr><td colspan="6" class="py-8 text-center text-red-400 text-xs">Gagal memuat data</td></tr>';
                    })
                    .getUsers();
            } catch (e) {
                console.warn('getUsers error:', e);
            }
        }

        /* Simpan cache data pegawai untuk keperluan edit */
        var _usersCache = [];

        /* FIX: satu-satunya jalur untuk membuka modal edit dari tabel
           pegawai, baik dari loadPegawaiData() maupun renderAdmin().
           Mengambil data mentah dari cache (bukan dari atribut onclick),
           sehingga nama/jabatan yang berisi kutip tunggal tidak pernah
           perlu di-inject langsung ke HTML attribute. */
        function loadAndEditUser(id) {
            if (_usersCache.length) {
                var u = _usersCache.find(function (x) { return x[0] == id; });
                if (u) { openUserModal(u[0], u[1], u[2], u[3], u[4]); return; }
            }
            google.script.run
                .withSuccessHandler(function (data) {
                    _usersCache = data || [];
                    var u = _usersCache.find(function (x) { return x[0] == id; });
                    if (u) openUserModal(u[0], u[1], u[2], u[3], u[4]);
                    else showToast('Data pegawai tidak ditemukan');
                })
                .withFailureHandler(function () { showToast('Gagal memuat data pegawai'); })
                .getUsers();
        }

        /* =============================================================
           LOG ABSENSI
           FIX: index userName=13, mapsUrl=12 (sesuai backend baru)
        ============================================================= */
        var allLogData = [];

        function loadAttendanceLog() {
            try {
                document.getElementById('adminAbsenceLog').innerHTML =
                    '<tr><td colspan="6" class="py-8 text-center text-gray-400 text-xs"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat data...</td></tr>';
                google.script.run
                    .withSuccessHandler(function (data) {
                        allLogData = data || [];
                        renderLogTable(allLogData);
                    })
                    .withFailureHandler(function () {
                        document.getElementById('adminAbsenceLog').innerHTML =
                            '<tr><td colspan="6" class="py-8 text-center text-red-400 text-xs">Gagal memuat log absensi</td></tr>';
                    })
                    .getAttendanceLog();
            } catch (e) {
                console.warn('getAttendanceLog error:', e);
            }
        }

        function renderLogTable(data) {
            document.getElementById('logCount').innerText = 'Total: ' + data.length + ' data';
            if (!data.length) {
                document.getElementById('adminAbsenceLog').innerHTML =
                    '<tr><td colspan="6" class="py-8 text-center text-gray-400 text-xs">Belum ada riwayat absensi</td></tr>';
                return;
            }

            document.getElementById('adminAbsenceLog').innerHTML = data.map(function (a, i) {
                // FIX: index eksplisit sesuai backend baru
                // [10]photoIn [11]photoOut [12]mapsUrl [13]userName
                var nama    = esc(a[13] || 'Anonim');
                var mapsUrl = esc(a[12] || '#');
                var status  = a[9]  || 'Hadir';

                var statusBadge = status === 'Hadir'
                    ? '<span class="px-2 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-[9px] font-black uppercase">' + esc(status) + '</span>'
                    : '<span class="px-2 py-1 bg-amber-50 text-amber-600 rounded-lg text-[9px] font-black uppercase">' + esc(status) + '</span>';

                return '<tr class="' + (i % 2 === 0 ? 'bg-white' : 'bg-gray-50') + ' border-b border-gray-100 hover:bg-indigo-50 transition-colors">' +
                    '<td class="py-3 px-3 font-bold text-gray-900 whitespace-nowrap">' + nama + '</td>' +
                    '<td class="py-3 px-3 font-bold text-gray-600">' + esc(a[2]) + '</td>' +
                    '<td class="py-3 px-3 font-bold text-indigo-600">' + esc(a[3]) + '</td>' +
                    '<td class="py-3 px-3 font-bold text-red-500">' + esc(a[4] || '--:--') + '</td>' +
                    '<td class="py-3 px-3 text-center">' + statusBadge + '</td>' +
                    '<td class="py-3 px-3 text-center">' +
                    '<a href="' + mapsUrl + '" target="_blank" class="inline-flex items-center justify-center w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-colors"><i class="fas fa-map-location-dot text-[10px]"></i></a>' +
                    '</td></tr>';
            }).join('');
        }

        /* FIX: filterBulan dan filterTanggal sekarang saling reset otomatis.
           Sebelumnya jika user mengisi filterBulan lalu mengisi filterTanggal,
           keduanya tetap tersimpan di DOM dan applyLogFilter() mengutamakan
           filterTanggal — tapi filterBulan tidak ikut dikosongkan di UI,
           sehingga terlihat seperti dua filter aktif bersamaan (membingungkan)
           padahal logikanya hanya satu yang dipakai. Sekarang field yang lain
           langsung dikosongkan begitu salah satu filter diisi.
        ============================================================= */
        function applyLogFilter() {
            var elBulan   = document.getElementById('filterBulan');
            var elTanggal = document.getElementById('filterTanggal');
            var filterBulan   = elBulan.value;
            var filterTanggal = elTanggal.value;

            // Jika tanggal spesifik dipilih, filter bulan tidak relevan lagi -> reset di UI
            if (filterTanggal) {
                elBulan.value = '';
                filterBulan = '';
            }

            var filtered = allLogData.filter(function (a) {
                var tgl = a[2];
                if (!tgl) return false;
                if (filterTanggal) return tgl === filterTanggal;
                if (filterBulan)   return tgl.startsWith(filterBulan);
                return true;
            });
            renderLogTable(filtered);
        }

        // FIX: dipanggil dari onchange filterBulan agar filterTanggal ikut reset juga (dua arah)
        function onFilterBulanChange() {
            var elBulan   = document.getElementById('filterBulan');
            var elTanggal = document.getElementById('filterTanggal');
            if (elBulan.value) elTanggal.value = '';
            applyLogFilter();
        }

        function resetLogFilter() {
            document.getElementById('filterBulan').value   = '';
            document.getElementById('filterTanggal').value = '';
            renderLogTable(allLogData);
        }

        /* =============================================================
           EXPORT PDF — pakai window.print() dengan CSS print khusus
           FIX: tambah warning konfirmasi jika data > 500 baris, karena
           window.print() dengan ribuan baris bisa membuat browser hang
           atau render sangat lambat di device low-end (terutama WebView
           Kodular). User diberi pilihan lanjut atau batal.
        ============================================================= */
        function exportPDF() {
            var filterBulan   = document.getElementById('filterBulan').value;
            var filterTanggal = document.getElementById('filterTanggal').value;

            // Tentukan data yang akan dicetak
            var dataCetak = allLogData;
            var judulFilter = 'Semua Data';
            if (filterBulan) {
                dataCetak = allLogData.filter(function(a) { return a[2] && a[2].startsWith(filterBulan); });
                var parts = filterBulan.split('-');
                var bulanNames = ['','Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
                judulFilter = 'Bulan ' + bulanNames[parseInt(parts[1])] + ' ' + parts[0];
            } else if (filterTanggal) {
                dataCetak = allLogData.filter(function(a) { return a[2] === filterTanggal; });
                judulFilter = 'Tanggal ' + filterTanggal;
            }

            if (!dataCetak.length) {
                showToast('Tidak ada data untuk di-export!');
                return;
            }

            // FIX: warning jika data terlalu banyak
            var MAX_SAFE_EXPORT = 500;
            if (dataCetak.length > MAX_SAFE_EXPORT) {
                var lanjut = confirm(
                    '⚠️ Data yang akan di-export ada ' + dataCetak.length + ' baris.\n' +
                    'Export data sebanyak ini bisa membuat browser lambat atau macet,\n' +
                    'terutama di HP. Disarankan filter per bulan/tanggal dulu.\n\n' +
                    'Tetap lanjutkan export semua data ini?'
                );
                if (!lanjut) return;
            }

            // Hitung statistik
            var totalHadir = dataCetak.filter(function(a) { return (a[9] || 'Hadir') === 'Hadir'; }).length;
            var totalIzin  = dataCetak.length - totalHadir;
            var printed    = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });

            // Buat isi tabel
            var rows = dataCetak.map(function(a, i) {
                var status = a[9] || 'Hadir';
                var statusColor = status === 'Hadir' ? '#10b981' : '#f59e0b';
                return '<tr style="background:' + (i%2===0?'#fff':'#f8fafc') + ';">' +
                    '<td style="padding:8px 10px;border-bottom:1px solid #e2e8f0;">' + (i+1) + '</td>' +
                    '<td style="padding:8px 10px;border-bottom:1px solid #e2e8f0;font-weight:700;">' + esc(a[13] || '-') + '</td>' +
                    '<td style="padding:8px 10px;border-bottom:1px solid #e2e8f0;">' + esc(a[2] || '-') + '</td>' +
                    '<td style="padding:8px 10px;border-bottom:1px solid #e2e8f0;color:#6366f1;font-weight:700;">' + esc(a[3] || '-') + '</td>' +
                    '<td style="padding:8px 10px;border-bottom:1px solid #e2e8f0;color:#ef4444;font-weight:700;">' + esc(a[4] || '--:--') + '</td>' +
                    '<td style="padding:8px 10px;border-bottom:1px solid #e2e8f0;"><span style="background:' + statusColor + '22;color:' + statusColor + ';padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;">' + esc(status) + '</span></td>' +
                '</tr>';
            }).join('');

            // Buat halaman print
            var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
                '<title>Log Absensi - ' + judulFilter + '</title>' +
                '<style>' +
                    'body{font-family:Arial,sans-serif;margin:0;padding:20px;color:#1e293b;}' +
                    'h1{font-size:20px;font-weight:900;margin:0;color:#1e293b;}' +
                    'h2{font-size:13px;font-weight:600;color:#6366f1;margin:4px 0 0;}' +
                    '.header{border-bottom:3px solid #6366f1;padding-bottom:12px;margin-bottom:16px;}' +
                    '.stats{display:flex;gap:16px;margin-bottom:16px;}' +
                    '.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;text-align:center;}' +
                    '.stat-num{font-size:22px;font-weight:900;color:#6366f1;}' +
                    '.stat-lbl{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;}' +
                    'table{width:100%;border-collapse:collapse;font-size:12px;}' +
                    'thead tr{background:#1e293b;color:white;}' +
                    'thead th{padding:10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;}' +
                    '.footer{margin-top:16px;font-size:10px;color:#94a3b8;text-align:right;}' +
                    '@media print{body{padding:10px;}button{display:none!important;}}' +
                '</style></head><body>' +
                '<div class="header">' +
                    '<h1>📋 Laporan Log Absensi</h1>' +
                    '<h2>Presensi Solider &nbsp;|&nbsp; ' + judulFilter + '</h2>' +
                '</div>' +
                '<div class="stats">' +
                    '<div class="stat"><div class="stat-num">' + dataCetak.length + '</div><div class="stat-lbl">Total Data</div></div>' +
                    '<div class="stat"><div class="stat-num" style="color:#10b981;">' + totalHadir + '</div><div class="stat-lbl">Hadir</div></div>' +
                    '<div class="stat"><div class="stat-num" style="color:#f59e0b;">' + totalIzin + '</div><div class="stat-lbl">Izin/Lainnya</div></div>' +
                '</div>' +
                '<table>' +
                    '<thead><tr><th>#</th><th>Nama</th><th>Tanggal</th><th>Jam Masuk</th><th>Jam Keluar</th><th>Status</th></tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                '</table>' +
                '<div class="footer">Dicetak pada ' + printed + ' &nbsp;|&nbsp; Presensi Solider</div>' +
                '<br><button onclick="window.print()" style="background:#6366f1;color:white;border:none;padding:10px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;">🖨️ Cetak / Save PDF</button>' +
                '</body></html>';

            var win = window.open('', '_blank');
            if (!win) {
                showToast('Popup diblokir! Izinkan popup di browser.');
                return;
            }
            win.document.write(html);
            win.document.close();
            win.focus();
        }

        /* =============================================================
           LOGIN & LOGOUT
           FIX: btn.disabled = true agar tidak bisa double-klik
        ============================================================= */
        function handleLogin() {
            const phone = document.getElementById('loginPhone').value.trim();
            const pass  = document.getElementById('loginPass').value;
            const btn   = document.getElementById('btnLogin');

            if (!phone || !pass) return showToast("Harap isi semua bidang!");
            if (btn.disabled) return; // FIX: cegah Enter dobel saat sudah proses

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            btn.disabled  = true; // FIX: cegah double submit

            google.script.run
                .withSuccessHandler(res => {
                    if (res && res.success) {
                        user = res.user;
                        localStorage.setItem('presensi_user_v3', JSON.stringify(user));
                        setupApp();
                    } else {
                        showToast(res ? res.message : "Terjadi kesalahan server");
                        btn.innerHTML = 'MASUK SEKARANG';
                        btn.disabled  = false;
                    }
                })
                .withFailureHandler(err => {
                    showToast("Gagal terhubung ke server");
                    btn.innerHTML = 'MASUK SEKARANG';
                    btn.disabled  = false;
                })
                .checkLogin(phone, pass);
        }

        // FIX: listener Enter dipindah ke dalam window.onload (lihat atas).
        // window.addEventListener('load', ...) yang lama dihapus karena
        // berisiko race condition dengan window.onload di iframe GAS.

        function handleLogout() {
            if (!confirm('Yakin ingin keluar?')) return;
            localStorage.removeItem('presensi_user_v3');

            // FIX: location.reload() di dalam iframe sandbox Google Apps Script
            // web app sering gagal memuat ulang HTML dari server dan malah
            // menghasilkan halaman blank putih. Solusinya: reset state
            // secara manual tanpa reload browser sama sekali.
            user = null;

            userMap = null;
            adminMap = null;
            userPosMarker = null;
            userOfficeCircle = null;
            userOfficeMarker = null;
            adminMarker = null;
            adminCircle = null;
            hasInitialGPSFix = false;
            const mc = document.getElementById('user-map');
            if (mc) mc.innerHTML = '';

            // Reset form login
            document.getElementById('loginPhone').value = '';
            document.getElementById('loginPass').value  = '';
            document.getElementById('btnLogin').innerHTML = 'MASUK SEKARANG';
            document.getElementById('btnLogin').disabled  = false;

            // Sembunyikan menu admin lagi
            document.getElementById('nav-setting').classList.add('hidden');
            document.getElementById('nav-pegawai').classList.add('hidden');

        // Dipanggil saat label diklik — cek radius dulu, lalu biarkan label buka input (web) atau trigger Kodular
        function handleAttendanceClick(type, event) {
            attType = type;
            const dist = calculateDist(currentLoc.lat, currentLoc.lng, office.lat, office.lng);
            if (dist > office.rad) {
                event.preventDefault();
                return showToast("Gagal: Anda berada di luar radius kantor!");
            }
            if (window.AppInventor) {
                event.preventDefault();
                window.AppInventor.setWebViewString("openCamera");
                return;
            }
            // Browser web (termasuk di dalam iframe GAS):
            // Trigger input file secara manual agar kamera terbuka langsung
            event.preventDefault();
            var inputId = (type === 'IN') ? 'cameraInputMasuk' : 'cameraInputKeluar';
            document.getElementById(inputId).click();
        }

        // Dipanggil saat foto dipilih di browser web
        function handleCameraChange(type, input) {
            if (!input.files || !input.files[0]) return;
            attType = type;
            var file = input.files[0];
            var reader = new FileReader();
            reader.onload = function (ev) {
                var img = new Image();
                img.onload = function () {
                    var can  = document.getElementById('canvas');
                    // Kompres lebih agresif: maxW 480px, quality 0.4
                    // agar tidak timeout di Google Apps Script (batas 30 detik)
                    var maxW  = 480;
                    var scale = (img.width > maxW) ? maxW / img.width : 1;
                    can.width  = img.width  * scale;
                    can.height = img.height * scale;
                    can.getContext('2d').drawImage(img, 0, 0, can.width, can.height);
                    var dataUrl = can.toDataURL('image/jpeg', 0.4);

                    // Cek ukuran hasil kompres (GAS max ~5MB payload)
                    var sizeKB = Math.round(dataUrl.length * 0.75 / 1024);
                    if (sizeKB > 4500) {
                        showToast("Foto terlalu besar (" + sizeKB + "KB), coba lagi.");
                        return;
                    }

                    showToast("📤 Mengirim absensi... mohon tunggu");

                    // Timeout fallback: jika 35 detik tidak ada respons, beri tahu user
                    var timeoutId = setTimeout(function() {
                        showToast("⏱ Server lambat merespons. Cek riwayat absensi Anda.");
                    }, 35000);

                    google.script.run
                        .withSuccessHandler(function (res) {
                            clearTimeout(timeoutId);
                            showToast(res.message);
                            if (res.success) refreshData();
                        })
                        .withFailureHandler(function (err) {
                            clearTimeout(timeoutId);
                            showToast("Gagal kirim absensi. Coba lagi.");
                            console.error("submitAttendance error:", err);
                        })
                        .submitAttendance(attType, currentLoc.lat, currentLoc.lng, user.id, dataUrl);
                };
                img.onerror = function() { showToast("Gagal memuat foto."); };
                img.src = ev.target.result;
            };
            reader.onerror = function() { showToast("FileReader error."); };
            reader.readAsDataURL(file);
        }

        /* =============================================================
           FETCH DATA DASHBOARD
           FIX: race condition — flag _isRefreshing mencegah refreshData()
           dipanggil bertumpuk (misal user tap tombol refresh berkali-kali
           dengan cepat, atau auto-refresh dan tap manual bersamaan), yang
           sebelumnya bisa menyebabkan beberapa response saling menimpa
           render DOM yang sama dengan urutan tidak terduga.
        ============================================================= */
        var _isRefreshing = false;

        function refreshData() {
            if (!user) return;
            if (_isRefreshing) return; // FIX: cegah request bertumpuk
            _isRefreshing = true;

            document.getElementById('refreshIcon')?.classList.add('spinning');
            google.script.run
                .withSuccessHandler(res => {
                  document.getElementById('refreshIcon')?.classList.remove('spinning');
                  _isRefreshing = false; // FIX: reset flag setelah selesai

                    if (!res || res.error) {
                        console.warn('refreshData error:', res && res.error);
                        if (res && res.error) showToast('Server error: ' + res.error);
                        initUserMap(office.lat, office.lng, office.rad);
                        updateGPSUI();
                        return;
                    }

                    if (res.settings) {
                        const s      = res.settings;
                        const rawLat = s.office_lat || s.officelat || s.lat;
                        const rawLng = s.office_lng || s.officelng || s.lng;
                        const rawRad = s.radius     || s.rad;
                        const parsedLat = parseFloat(rawLat);
                        const parsedLng = parseFloat(rawLng);
                        // FIX: validasi rentang sebelum dipakai, sebagai lapis
                        // pengaman tambahan terhadap data salah skala dari sheet.
                        if (rawLat && rawLng && Math.abs(parsedLat) <= 90 && Math.abs(parsedLng) <= 180) {
                            office = { lat: parsedLat, lng: parsedLng, rad: parseInt(rawRad) || 100 };
                            localStorage.setItem('presensi_office_v3', JSON.stringify(office));
                        } else if (rawLat && rawLng) {
                            console.warn('Settings office_lat/lng tidak valid, diabaikan:', rawLat, rawLng);
                        }
                    }

                    initUserMap(office.lat, office.lng, office.rad);

                    const historyDiv = document.getElementById('userHistory');
                    // Hanya kumpulkan tanggal izin yang DISETUJUI untuk menyembunyikan absen di hari itu
                    const attItems = (res.history || []).map(h => ({
                        type:   'absen',
                        tgl:    h[2] || '',
                        jamIn:  h[3] || '',
                        jamOut: h[4] || '',
                        status: h[9] || 'Hadir'
                    }));
                    const izinItems = (res.userPermits || []).map(p => ({
                        type:       'izin',
                        tgl:        p[3] || '',
                        jenisIzin:  p[4] || 'Izin',
                        alasan:     p[5] || '',
                        statusIzin: p[7] || 'Menunggu'
                    }));
                    const combined = [...attItems, ...izinItems]
                        .sort((a, b) => (b.tgl > a.tgl ? 1 : b.tgl < a.tgl ? -1 : 0));

                    if (combined.length > 0) {
                        historyDiv.innerHTML = combined.map(item => {
                            if (item.type === 'absen') {
                                return `
                                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 flex-shrink-0">
                                            <i class="fas fa-fingerprint text-sm"></i>
                                        </div>
                                        <div>
                                            <p class="text-[10px] font-black text-indigo-600">${esc(item.tgl)}</p>
                                            <h4 class="font-bold text-gray-900 text-xs">${esc(item.jamIn)} – ${esc(item.jamOut || '--:--')}</h4>
                                        </div>
                                    </div>
                                    <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-[9px] font-bold">${esc(item.status)}</span>
                                </div>`;
                            } else {
                                const sc = item.statusIzin === 'Disetujui'
                                    ? 'bg-emerald-50 text-emerald-600'
                                    : item.statusIzin === 'Ditolak'
                                        ? 'bg-red-50 text-red-500'
                                        : 'bg-amber-50 text-amber-600';
                                return `
                                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500 flex-shrink-0">
                                            <i class="fas fa-file-medical text-sm"></i>
                                        </div>
                                        <div>
                                            <p class="text-[10px] font-black text-amber-500">${esc(item.tgl)} • ${esc(item.jenisIzin)}</p>
                                            <h4 class="font-bold text-gray-900 text-xs truncate max-w-[160px]">${esc(item.alasan)}</h4>
                                        </div>
                                    </div>
                                    <span class="px-3 py-1 rounded-lg text-[9px] font-bold ${sc}">${esc(item.statusIzin)}</span>
                                </div>`;
                            }
                        }).join('');
                    } else {
                        historyDiv.innerHTML = '<p class="text-center text-xs py-4 text-gray-400">Belum ada riwayat</p>';
                    }

                    if (user.role === 'admin') renderAdmin(res);
                    updateGPSUI();
                })
                .withFailureHandler(err => {
                  document.getElementById('refreshIcon')?.classList.remove('spinning');
                  _isRefreshing = false; // FIX: reset flag juga saat gagal
                    console.error('refreshData GAGAL:', err);
                    showToast("Gagal memuat data dari server");
                    initUserMap(office.lat, office.lng, office.rad);
                })
                .getDashboardData(user.id, user.role);
        }

        function openUserModal(id = '', nama = '', jab = '', phone = '', role = 'pegawai') {
            document.getElementById('editId').value   = id;
            document.getElementById('uNama').value    = nama;
            document.getElementById('uJab').value     = jab;
            document.getElementById('uPhone').value   = phone;
            document.getElementById('uRole').value    = role;
            document.getElementById('uPass').value    = ''; // FIX: kosongkan, user isi manual jika ingin ganti
            document.getElementById('modalTitle').innerText = id ? "Edit Pegawai" : "Tambah Pegawai";
            if (id) {
                document.getElementById('uPass').placeholder = 'Password baru (kosongkan jika tidak diganti)';
            } else {
                document.getElementById('uPass').placeholder = 'Password';
            }
            document.getElementById('userModal').classList.replace('hidden', 'flex');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.replace('flex', 'hidden');
        }

        function submitUser() {
            const id   = document.getElementById('editId').value;
            const data = {
                id:       id,
                nama:     document.getElementById('uNama').value.trim(),
                jabatan:  document.getElementById('uJab').value.trim(),
                phone:    document.getElementById('uPhone').value.trim(),
                role:     document.getElementById('uRole').value,
                password: document.getElementById('uPass').value
            };

            if (!data.nama || !data.phone) return showToast("Nama & HP wajib diisi!");
            if (!id && !data.password)     return showToast("Password wajib diisi untuk pegawai baru!");

            showToast("Menyimpan data...");
            const func = id ? 'editUser' : 'addUser';
            google.script.run
                .withSuccessHandler(res => {
                    showToast(res.message || 'Berhasil');
                    closeUserModal();
                    _usersCache = []; // reset cache
                    refreshData();
                })
                .withFailureHandler(() => showToast("Gagal simpan data"))
            [func](data);
        }

        function deleteUserUI(id) {
            if (confirm("Hapus data pegawai ini permanen?")) {
                google.script.run
                    .withSuccessHandler(res => {
                        showToast(res.message || 'Berhasil dihapus');
                        _usersCache = [];
                        refreshData();
                    })
                    .withFailureHandler(() => showToast("Gagal hapus data"))
                    .deleteUser(id);
            }
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    currentLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    updateGPSUI();
                    updateUserMapLive();
                    // FIX: jangan set flag true kalau map belum terbentuk.
                    // Sebelumnya GPS biasanya didapat lebih cepat daripada proses
                    // pembuatan map (yang ditunda 1500ms), jadi hasInitialGPSFix
                    // sudah true padahal map belum pernah di-auto-center.
                    if (!hasInitialGPSFix && userMap) {
                        hasInitialGPSFix = true;
                        centerMapOnUser();
                    }
                }, err => console.error('GPS error:', err), {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            }
        }

        var _mapInitTimer = null;

        function initUserMap(lat, lng, rad) {
            const mc = document.getElementById('user-map');

            if (lat && lng) {
                office.lat = lat;
                office.lng = lng;
                office.rad = rad || office.rad;

            if (!office.lat || !office.lng) return;

            userMap = true;
            hasInitialGPSFix = true;
            renderUserMapUI();
            updateGPSUI();

                    </div>
                    <div style="font-size:22px;font-weight:900;color:${inRange ? '#10b981' : '#ef4444'};margin-top:2px;">

                <div style="width:100%;background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden;">

        function updateUserMapLive() {
            // Update UI GPS card setiap kali posisi berubah
            if (userMap) renderUserMapUI();
        }

        function centerMapOnUser() {
            if (userMap) renderUserMapUI();
        }

        function initAdminMap(lat, lng, rad) {
            if (!lat || !lng) return;
            var mc = document.getElementById('admin-map');
            if (!mc) return;

            // Hanya isi field jika masih kosong (tidak overwrite yang sedang diketik user)
            var elLat = document.getElementById('adm-lat');
            var elLng = document.getElementById('adm-lng');
            var elRad = document.getElementById('adm-rad');
            if (elLat && !elLat.value) elLat.value = lat.toFixed(6);
            if (elLng && !elLng.value) elLng.value = lng.toFixed(6);
            if (elRad && !elRad.value) elRad.value = rad;

            var mapsUrl = 'https://www.google.com/maps?q=' + lat + ',' + lng + '&z=17';
            mc.innerHTML = '<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px;box-sizing:border-box;">' +
                '<div style="font-size:40px;">🏢</div>' +
                '<div style="text-align:center;">' +
                    '<div style="font-size:10px;font-weight:900;color:#818cf8;text-transform:uppercase;letter-spacing:1px;">Titik Kantor</div>' +
                    '<div style="font-size:13px;font-weight:800;color:white;margin-top:4px;">' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</div>' +
                    '<div style="font-size:10px;color:#94a3b8;margin-top:2px;">Radius: ' + rad + ' meter</div>' +
                '</div>' +
                '<a href="' + mapsUrl + '" target="_blank" style="background:#6366f1;color:white;font-size:10px;font-weight:800;padding:8px 20px;border-radius:12px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;">🗺️ Buka di Google Maps</a>' +
                '<div style="font-size:9px;color:#64748b;text-align:center;">Ubah koordinat: isi Lat/Lng di bawah lalu klik SIMPAN</div>' +
            '</div>';

            adminMap = true;
        }

        function updateMapCircle() {
            // Tidak ada circle Leaflet, tidak perlu lakukan apa-apa
        }

        function saveGPS() {
            const la = document.getElementById('adm-lat').value;
            const ln = document.getElementById('adm-lng').value;
            const rd = document.getElementById('adm-rad').value;
            if (!la || !ln || !rd) return showToast("Isi semua data!");

            const laNum = parseFloat(la);
            const lnNum = parseFloat(ln);

            // FIX: validasi rentang koordinat sebelum disimpan. Latitude harus
            // -90..90 dan longitude -180..180. Ini mencegah nilai yang sudah
            // salah skala (misal akibat masalah locale Sheets, jadi 3509954
            // bukan 3.509954) ikut tersimpan dan memperburuk masalah peta.
            if (Math.abs(laNum) > 90 || Math.abs(lnNum) > 180) {
                return showToast("Koordinat tidak valid! Klik ulang titik di peta.");
            }

            office = { lat: laNum, lng: lnNum, rad: parseInt(rd) };
            localStorage.setItem('presensi_office_v3', JSON.stringify(office));

            showToast("Menyimpan...");
            google.script.run
                .withSuccessHandler(res => {
                    showToast(res.message);
                    refreshData();
                })
                .withFailureHandler(() => showToast("Gagal simpan setting"))
                .updateOfficeSettings(laNum, lnNum, rd);
        }

        /* =============================================================
           ADMIN IZIN — APPROVAL TAB
        ============================================================= */
        var allIzinData = [];

        function loadAdminIzin() {
            const listEl = document.getElementById('adminIzinList');
            listEl.innerHTML = '<p class="text-center text-xs py-8 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Memuat data...</p>';
            google.script.run
                .withSuccessHandler(function(res) {
                    allIzinData = (res && res.allPermits) ? res.allPermits : [];
                    applyIzinFilter();
                })
                .withFailureHandler(function() {
                    listEl.innerHTML = '<p class="text-center text-xs py-8 text-red-400">Gagal memuat data izin</p>';
                })
                .getDashboardData(user.id, user.role);
        }

        function applyIzinFilter() {
            const filterStatus = document.getElementById('filterIzinStatus').value;
            const filterJenis  = document.getElementById('filterIzinJenis').value;
            const filtered = allIzinData.filter(function(p) {
                const statusOk = !filterStatus || p[7] === filterStatus;
                const jenisOk  = !filterJenis  || p[4] === filterJenis;
                return statusOk && jenisOk;
            });
            renderAdminIzin(filtered);
        }

        function resetIzinFilter() {
            document.getElementById('filterIzinStatus').value = '';
            document.getElementById('filterIzinJenis').value  = '';
            renderAdminIzin(allIzinData);
        }

        function renderAdminIzin(data) {
            document.getElementById('izinCount').innerText = 'Total: ' + data.length + ' data';
            const listEl = document.getElementById('adminIzinList');
            if (!data.length) {
                listEl.innerHTML = '<p class="text-center text-xs py-8 text-gray-400">Tidak ada data izin</p>';
                return;
            }
            // Kolom Permits: [0]id [1]userId [2]nama [3]tgl [4]jenis [5]alasan [6]lampiran [7]status_app
            listEl.innerHTML = data.map(function(p) {
                const id        = esc(p[0]);
                const nama      = esc(p[2] || 'Anonim');
                const tgl       = esc(p[3] || '-');
                const jenis     = esc(p[4] || '-');
                const alasan    = esc(p[5] || '-');
                const lampiran  = esc(p[6] || '');
                const status    = p[7] || 'Menunggu';

                const scBadge = status === 'Disetujui'
                    ? 'bg-emerald-100 text-emerald-700'
                    : status === 'Ditolak'
                        ? 'bg-red-100 text-red-600'
                        : 'bg-amber-100 text-amber-700';
                const jenisIcon = jenis === 'Sakit'
                    ? 'fa-notes-medical text-red-400'
                    : jenis === 'Cuti'
                        ? 'fa-umbrella-beach text-sky-400'
                        : 'fa-file-medical text-amber-400';

                const btnApprove = status === 'Menunggu'
                    ? `<button onclick="updateIzinStatus('${id}','Disetujui')"
                            class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl text-[10px] font-bold active:scale-95 transition-all shadow-sm">
                            <i class="fas fa-check mr-1"></i> Setujui
                       </button>
                       <button onclick="updateIzinStatus('${id}','Ditolak')"
                            class="flex-1 bg-red-500 text-white py-2.5 rounded-xl text-[10px] font-bold active:scale-95 transition-all shadow-sm">
                            <i class="fas fa-times mr-1"></i> Tolak
                       </button>`
                    : `<span class="flex-1 text-center text-[10px] font-bold text-gray-400 py-2">
                            Sudah diproses
                       </span>`;

                return `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-3">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center flex-shrink-0">
                            <i class="fas ${jenisIcon} text-base"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-0.5">
                                <h4 class="font-black text-gray-900 text-sm truncate">${nama}</h4>
                                <span class="ml-2 px-2 py-0.5 rounded-lg text-[9px] font-black uppercase flex-shrink-0 ${scBadge}">${esc(status)}</span>
                            </div>
                            <p class="text-[10px] font-bold text-indigo-600">${tgl} • ${jenis}</p>
                            <p class="text-[10px] text-gray-500 mt-0.5 line-clamp-2">${alasan}</p>
                        </div>
                    </div>
                    ${lampiran ? `
                    <div class="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-xl">
                        <i class="fas fa-paperclip text-gray-400 text-xs"></i>
                        <a href="${lampiran}" target="_blank" class="text-[10px] font-bold text-indigo-600 truncate underline">
                            Lihat Lampiran
                        </a>
                    </div>` : ''}
                    <div class="flex gap-2 pt-1 border-t border-dashed border-gray-100">
                        ${btnApprove}
                    </div>
                </div>`;
            }).join('');
        }

        function updateIzinStatus(id, status) {
            const label = status === 'Disetujui' ? 'menyetujui' : 'menolak';
            if (!confirm('Yakin ' + label + ' pengajuan izin ini?')) return;
            showToast('Memproses...');
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res && res.success) {
                        showToast('Status izin diperbarui!');
                        loadAdminIzin();
                        refreshData(); // perbarui badge pending di dashboard
                    } else {
                        showToast(res ? res.message : 'Gagal memperbarui status');
                    }
                })
                .withFailureHandler(function() { showToast('Gagal terhubung ke server'); })
                .updatePermitStatus(id, status);
        }

        /* =============================================================
           IZIN / PERMITS
           FIX: validasi ukuran file maks 5MB
                fileData dikirim base64 murni — backend yang rekonstruksi data URL
        ============================================================= */
        var _permitMode = false;
        function openPermitModal() {
            const tzoffset    = (new Date()).getTimezoneOffset() * 60000;
            const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
            document.getElementById('pDate').value   = localISOTime;
            document.getElementById('pReason').value = '';
            document.getElementById('pFileData').value  = '';
            document.getElementById('pFileName').value  = '';
            document.getElementById('pFileLabel').innerText = '📷 Tap untuk ambil foto';
            document.getElementById('permitModal').classList.replace('hidden', 'flex');
        }

        function triggerPermitPhoto() {
            if (window.AppInventor) {
                // APK Kodular -- pakai kamera native Kodular
                _permitMode = true;
                window.AppInventor.setWebViewString('openCamera');
            } else {
                // Browser web -- pakai input file biasa
                document.getElementById('pFileCameraWeb').click();
            }
        }

        function handleWebPermitPhoto(input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];

            // FIX: validasi ukuran file maks 5MB sebelum dibaca/dikirim,
            // sesuai catatan di komentar header yang sebelumnya belum diterapkan.
            var MAX_BYTES = 5 * 1024 * 1024;
            if (file.size > MAX_BYTES) {
                showToast('Ukuran foto maks 5MB! Foto Anda ' + Math.round(file.size / 1024 / 1024 * 10) / 10 + 'MB');
                input.value = '';
                return;
            }

            var reader = new FileReader();
            reader.onload = function(e) {
                var base64 = e.target.result.split(',')[1];
                document.getElementById('pFileData').value = base64;
                document.getElementById('pFileName').value = file.name || 'foto_izin.jpg';
                document.getElementById('pFileLabel').innerText = '\u2705 Foto berhasil diambil';
            };
            reader.onerror = function() { showToast('Gagal membaca foto.'); };
            reader.readAsDataURL(file);
        }

        function closePermitModal() {
            document.getElementById('permitModal').classList.replace('flex', 'hidden');
        }

        function submitPermitAction() {
            const pType     = document.getElementById('pType').value;
            const pDate     = document.getElementById('pDate').value;
            const pReason   = document.getElementById('pReason').value.trim();
            const pFileData = document.getElementById('pFileData').value;
            const pFileName = document.getElementById('pFileName').value;
            const btn       = document.getElementById('btnSubmitPermit');

            if (!pDate || !pReason) return showToast("Tanggal & Alasan wajib diisi!");
            if (!pFileData)         return showToast("Wajib melampirkan foto bukti!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.disabled  = true;

            const permitData = {
                userId:   user.id,
                date:     pDate,
                type:     pType,
                reason:   pReason,
                fileName: pFileName,
                fileData: pFileData
            };

                google.script.run
                    .withSuccessHandler(res => {
                        btn.innerHTML = 'Kirim';
                        btn.disabled  = false;
                        if (res && res.success) {
                            showToast(res.message);
                            closePermitModal();
                            refreshData();
                        } else {
                            showToast(res ? res.message : "Terjadi kesalahan");
                        }
                    })
                    .withFailureHandler(() => {
                        btn.innerHTML = 'Kirim';
                        btn.disabled  = false;
                        showToast("Gagal mengirim data.");
                    })
                    .submitPermit(permitData);
        }

        /* =============================================================
           UTILITIES
        ============================================================= */
        function startTime() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('curTime').innerText = now.toLocaleTimeString('id-ID', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                document.getElementById('curDate').innerText = now.toLocaleDateString('id-ID', {
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                });
            }, 1000);
        }

        function calculateDist(l1, ln1, l2, ln2) {
            const R   = 6371e3;
            const dLa = (l2 - l1) * Math.PI / 180;
            const dLn = (ln2 - ln1) * Math.PI / 180;
            const a   = Math.sin(dLa / 2) * Math.sin(dLa / 2) +
                        Math.cos(l1 * Math.PI / 180) * Math.cos(l2 * Math.PI / 180) *
                        Math.sin(dLn / 2) * Math.sin(dLn / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if (!t) { console.warn('Toast not found:', msg); return; }
            t.innerText = msg;
            t.style.bottom = '110px';
            setTimeout(() => t.style.bottom = '-100px', 3000);
        }

        /* FIX: polling WebViewString Kodular diperlambat dari 500ms ke 1000ms
           untuk mengurangi beban CPU/battery di WebView, dan dihentikan
           otomatis saat tidak ada user login (tidak perlu polling terus saat
           di layar login, karena openCamera/foto hanya relevan setelah login). */
        setInterval(function() {
            if (!user) return; // FIX: stop polling saat tidak ada user
            if (window.AppInventor) {
                var str = window.AppInventor.getWebViewString();
                if (str && str !== 'openCamera' && str.length > 100) {
                    window.AppInventor.setWebViewString('');
                    receivePhoto(str);
                }
            }
        }, 1000);

    </script>
